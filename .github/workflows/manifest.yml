name: Regenerate manifest

# Whenever a runtime file changes, recompute manifest.json so the toolbox auto-update
# always has correct hashes - even for edits made directly on GitHub (web/PR).
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'manifest.json'
      - 'README.md'
      - '.github/**'

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate manifest.json
        run: node .github/gen-manifest.js
      - name: Commit if changed
        run: |
          if ! git diff --quiet manifest.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "ci: regenerate manifest.json"
            git push
          else
            echo "manifest already up to date"
          fi
